check_registry:
  qa_guidance: 确认每个风险项是否写清了触发机制、当前证据强度、发生概率判断和可观察的监控指标。
  description: |-
    检查 {company_name} 的 {pack_title} 当前 registry 是否已经达到可综合输出的最低要求。

    执行要求：
    - 先用 `read_registry` 按 `owner_crew="{owner_crew}"` 读取当前 crew 的条目，并重点审查 `record_extract_registry` 与 `record_search_registry` 刚完成 amend 的结果。
    - {qa_guidance}
    - 找出仍是 `unchecked / need_revision` 的关键条目，尤其是 `high / medium` 优先级。
    - 如果发现遗漏，使用 `status_update` 补充更具体的 `revision_detail`，并在 `registry_review` 里写明建议回退给 `extract` 还是 `search`。
    - 你不负责新增正文内容；你只负责检查、标记和留痕。
    - 任务结束前必须调用 `registry_review` 留痕。
  expected_output: 面向 manager 的 QA 检查备忘录：整体就绪状态（ready/not ready）、未通过的 `entry_id` 及问题类型、修订建议、建议回退给 `extract` 还是 `search`。
  agent: qa_check_agent
synthesize_and_output:
  synthesize_guidance: 输出要明确风险优先级矩阵、已观察到的预警信号、前瞻情景分析、缓释因素和跨 pack 待追问事项。
  output_skeleton: |
    严格按下列格式形成一份结构化文本，严格使用下列标题作为标题，不得遗漏以下任何一个标题，不要增加任何标题和分节。必要时可以补充表格辅助阅读。
    每节要求写明：核心结论 / 关键证据或数据 / 冲突点 / 待确认事项。

    # {company_name} 风险分析
    ## 1. 风险总览矩阵
    - 1.1 按优先级排列的风险清单（高/中/低）
    - 1.2 各风险项的证据强度与发生概率判断
    - 1.3 风险间的关联性与传导路径
    ## 2. 经营与客户风险
    - 2.1 客户集中度风险与大客户依赖
    - 2.2 订单波动与收入可持续性风险
    - 2.3 商业模式脆弱性
    ## 3. 供应链与产能风险
    - 3.1 供应商集中度与替代困难度
    - 3.2 产能扩张风险（投产延迟、利用率不足）
    - 3.3 原材料价格波动与成本传导能力
    ## 4. 技术与治理风险
    - 4.1 技术替代与研发失败风险
    - 4.2 核心人员流失风险
    - 4.3 治理结构缺陷（实控人集中、关联交易、内控不足）
    ## 5. 政策与外部环境风险
    - 5.1 监管政策变化风险
    - 5.2 行业周期与宏观经济风险
    - 5.3 国际贸易与地缘政治风险（如适用）
    ## 6. 缓释因素、观察指标与未解风险
    - 6.1 已有的风险缓释措施
    - 6.2 建议持续监控的指标与触发条件
    - 6.3 跨 pack 待追问事项与未解风险
  description: |-
    基于 registry 中 {company_name} 的 {pack_title} 生成最终 Markdown 分析包。

    输入：
    - 行业：{industry}
    - 输出路径：{pack_output_path}
    - 当前专题焦点：{pack_focus}

    执行要求：
    - 先用 `read_registry` 按 `owner_crew="{owner_crew}"` 读取当前 crew 的全部条目；必要时继续用 `view="entry_detail"` 下钻关键 `entry_id`。
    - 只综合当前 crew 负责的事实、数据、judgment 和相关证据，不得越权引用其他 pack 的未沉淀内容。
    - 本任务是严格只读综合：不得调用 `update_entry`、`add_entry`、`add_evidence` 或 `status_update` 修改 entry 内容、状态或证据。
    - 如果 `high / medium` 条目仍是 `unchecked / need_revision`，必须在正文和 `registry_review` 里显式写出缺口、影响和建议补证方向，不能偷偷补写 registry。
    - 明确区分：已被证据支持、存在冲突、仍未解决。
    - 如果存在冲突，要写明冲突点和严重程度，不要静默忽略。
    - {synthesize_guidance}
    - 任务结束前必须调用 `registry_review` 留痕，说明本轮综合输出是否仍有残余缺口。
  expected_output: |
    {output_skeleton}
  agent: synthesizing_agent
  output_file: '{pack_output_path}'
