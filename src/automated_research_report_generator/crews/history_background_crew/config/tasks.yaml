extract_file_facts:
  extract_guidance: 重点提取公司沿革时间线、历次股权变动、实控人链条、董监高履历和治理架构；注意捕捉关联交易和同业竞争披露。
  description: |-
    围绕 {company_name} 的 {pack_title} 执行 PDF 候选采集任务。

    输入：
    - PDF 文件路径：{pdf_file_path}
    - 页面索引文件路径：{page_index_file_path}
    - 当前 loop 原因：{loop_reason}
    - 当前专题焦点：{pack_focus}
    - 返工反馈：{qa_feedback}

    执行要求：
    - 先读取页码索引，再有选择地读取相关页面，不要通读全文。
    - {extract_guidance}
    - 先用 `read_registry` 按 `owner_crew="{owner_crew}"` 读取当前 crew 的条目清单，优先关注 `unchecked / need_revision` 的 `high / medium` 条目。
    - 只处理当前 crew 负责的条目和与之直接相关的新发现，不要越权补写其他 pack。
    - 如果 `qa_feedback` 非空，优先回应其中属于文件提取、原文核对和页码补证的缺口；被标成 `need_revision` 的条目要结合 `revision_detail` 输出定向修订建议。
    - 你的职责是生成“候选 patch 报告”，而不是直接调用 `update_entry`、`add_entry`、`add_evidence` 或 `status_update`。
    - 对每个候选更新，优先匹配已有 `entry_id`，明确写出拟更新字段、原文摘录、页码或章节位置、时间口径和置信度；只有确认现有条目没有语义匹配槽位时，才把它列入 `new_entry_candidates`。
    - 如果 PDF 原文与外部资料或现有判断冲突，必须写清冲突来源、冲突点和当前判断，不能静默忽略。
    - 如果在 PDF 中无法提取到可靠信息，明确写“未提取到信息”，并把缺口归入 `unresolved_gaps`。
    - 任务结束时只输出供 `record_extract_registry` 落账的候选 patch 报告，不直接写 registry。
  expected_output: |-
    面向 manager 和后续 record task 的候选 patch 报告，必须严格包含以下三段：
    1. `existing_entry_updates`：逐条列出建议 amend 的 `entry_id`、拟更新字段、建议值、来源摘要、时间口径、置信度，以及是否涉及冲突。
    2. `new_entry_candidates`：仅列出确认没有现有语义匹配槽位的新增候选，写明建议 `entry_type`、标题、核心内容、来源摘要和为什么不能并入旧条目。
    3. `unresolved_gaps`：列出仍未解决的缺口、缺失原因、建议下一步走 `extract` 还是 `search`，以及是否影响后续综合输出。
  agent: extract_file_fact_agent
record_extract_registry:
  description: |-
    基于 `extract_file_facts` 的候选 patch 报告，执行 extract 结果的 registry 落账与修订任务。

    输入：
    - 当前责任 crew：{owner_crew}
    - 当前 loop 原因：{loop_reason}
    - 当前专题焦点：{pack_focus}
    - 返工反馈：{qa_feedback}
    - 上游上下文：`extract_file_facts` 的候选 patch 报告

    执行要求：
    - 先用 `read_registry` 按 `owner_crew="{owner_crew}"` 读取当前 crew 的现有条目和需要返工的 `entry_id`。
    - 只负责把上游已整理好的候选 patch 写回 registry，不再重新发散搜索，也不重新通读 PDF。
    - 对 `existing_entry_updates` 中的候选，优先使用 `update_entry` amend 既有 `entry_id`；必要时补齐 `unit`、`period`、`source`、`confidence`。
    - 对 `content_type="table"` 的条目，按 `columns` 完整更新表格行，不要只补半行字段。
    - 只有确认现有条目不存在语义匹配槽位时，才允许使用 `add_entry` 新建条目。
    - 对新增或实质更新后的结论，必须补 `add_evidence`；必要时用 `status_update` 写清 `revision_detail`。
    - 如果 `qa_feedback` 非空，优先关闭其中属于 PDF 提取与原文核对的缺口；无法关闭的条目要明确保留为 `need_revision`。
    - 任务结束前必须调用 `registry_review` 留痕，说明本轮 amend 了哪些条目、是否新建条目，以及哪些缺口仍未关闭。
  expected_output: |-
    面向 manager 的落账结果摘要：
    - 已 amend 的 `entry_id` 列表与关键更新字段
    - 已新建的 `entry_id` 列表与新增原因
    - 仍未关闭的缺口与原因
    - 建议下一步交回 `extract`、`search` 还是直接进入 `qa` 的事项
  agent: extract_file_fact_agent
