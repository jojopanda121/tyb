check_registry:
  qa_guidance: 确认业务包是否已经回答'靠什么拿单、怎么交付、如何扩大份额'；客户集中度和技术来源是否有数据支撑。
  description: |-
    检查 {company_name} 的 {pack_title} 当前 registry 是否已经达到可综合输出的最低要求。

    执行要求：
    - 先用 `read_registry` 按 `owner_crew="{owner_crew}"` 读取当前 crew 的条目，并重点审查 `record_extract_registry` 与 `record_search_registry` 刚完成 amend 的结果。
    - {qa_guidance}
    - 找出仍是 `unchecked / need_revision` 的关键条目，尤其是 `high / medium` 优先级。
    - 如果发现遗漏，使用 `status_update` 补充更具体的 `revision_detail`，并在 `registry_review` 里写明建议回退给 `extract` 还是 `search`。
    - 你不负责新增正文内容；你只负责检查、标记和留痕。
    - 任务结束前必须调用 `registry_review` 留痕。
  expected_output: |-
    严格输出 JSON 对象，包含以下字段：
    - pack_name: 当前分析包名称（字符串）
    - overall_status: "ready" 或 "not_ready"
    - issues: 未通过条目列表，每项包含 entry_id、issue_type（枚举：missing_content / need_revision / source_conflict / incomplete_table）、detail
    - revision_suggestions: 修订建议列表（字符串数组）
    - recommended_rework_stage: "extract"、"search" 或 "none"
    - summary: 一段话总结检查结论
    ready 时 issues 应为空、recommended_rework_stage 应为 "none"。
  agent: qa_check_agent
synthesize_and_output:
  synthesize_guidance: 输出要明确商业模式闭环、客户结构与集中度风险、技术护城河强度、扩张路径可行性和待验证假设。
  output_skeleton: |
    严格按下列格式形成一份结构化文本，严格使用下列标题作为标题，不得遗漏以下任何一个标题，不要增加任何标题和分节。必要时可以补充表格辅助阅读。
    每节要求写明：核心结论 / 关键证据或数据 / 冲突点 / 待确认事项。

    # {company_name} 业务分析
    ## 1. 产品与解决方案
    - 1.1 产品/服务矩阵与分类
    - 1.2 核心产品的技术特征与差异化
    - 1.3 产品生命周期与迭代节奏
    ## 2. 客户与需求场景
    - 2.1 目标客户群体与典型需求场景
    - 2.2 客户集中度与前五大客户占比
    - 2.3 客户粘性与复购/续约特征
    ## 3. 收入模式与商业闭环
    - 3.1 收入确认方式与商业模式类型（项目制/订阅制/许可制等）
    - 3.2 从获客到交付到回款的完整闭环
    - 3.3 单位经济模型（如有数据）
    ## 4. 供应链与交付能力
    - 4.1 关键供应商与采购集中度
    - 4.2 交付流程与产能瓶颈
    - 4.3 供应链风险与替代方案
    ## 5. 技术与竞争优势
    - 5.1 技术来源（自研/外购/合作）与研发投入
    - 5.2 核心竞争壁垒与护城河强度
    - 5.3 与主要竞争对手的差异化定位
    ## 6. 扩张路径与关键分歧
    - 6.1 管理层披露的增长战略
    - 6.2 扩张路径的可行性评估
    - 6.3 待验证的关键商业假设
  description: |-
    基于 registry 中 {company_name} 的 {pack_title} 生成最终 Markdown 分析包。

    输入：
    - 行业：{industry}
    - 输出路径：{pack_output_path}
    - 当前专题焦点：{pack_focus}

    执行要求：
    - 先用 `read_registry` 按 `owner_crew="{owner_crew}"` 读取当前 crew 的全部条目；只有在已经通过 `read_registry` 拿到具体 `entry_id` 后，才允许继续用 `view="entry_detail"` 下钻关键条目。
    - 只综合当前 crew 负责的事实、数据、judgment 和相关证据，不得越权引用其他 pack 的未沉淀内容。
    - 本任务是严格只读综合：不得调用 `update_entry`、`add_entry`、`add_evidence` 或 `status_update` 修改 entry 内容、状态或证据。
    - 如果 `high / medium` 条目仍是 `unchecked / need_revision`，必须在正文和 `registry_review` 里显式写出缺口、影响和建议补证方向，不能偷偷补写 registry。
    - 明确区分：已被证据支持、存在冲突、仍未解决。
    - 如果存在冲突，要写明冲突点和严重程度，不要静默忽略。
    - {synthesize_guidance}
    - 任务结束前必须调用 `registry_review` 留痕，说明本轮综合输出是否仍有残余缺口。
  expected_output: |
    {output_skeleton}
  agent: synthesizing_agent
  output_file: '{pack_output_path}'
