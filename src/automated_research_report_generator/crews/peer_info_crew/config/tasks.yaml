search_facts:
  crew_name: "peer_info_crew"
  pack_name: "peer_info_pack"
  pack_title: "同行信息分析包"
  pack_focus: "围绕可比公司筛选标准、样本清单、经营与财务可比性、估值倍数对比和可比性限制完成同行专题研究。"
  output_title: "同行信息分析包"
  search_guidance: "重点筛选同行名单并补齐主营构成差异、地域差异、规模差异和上市状态；搜集 peer 的收入、利润率和估值倍数。"
  description: >
    围绕 {company_name} 的 {pack_title} 执行外部搜索补证任务。

    输入：
    - 行业：{industry}
    - 当前责任 crew：{owner_crew}
    - 当前 loop 原因：{loop_reason}
    - 当前专题焦点：{pack_focus}
    - 返工反馈：{qa_feedback}
    - 上游行业分析包：{industry_pack_text}
    - 上游业务分析包：{business_pack_text}

    执行要求：
    - 先使用 `read_registry`，建议优先 `view="entry_list"`，并按 `owner_crew="{owner_crew}"`、`include_statuses=["unchecked","need_revision"]` 筛出本 crew 当前要处理的条目。
    - 如果需要补正文或表格，继续用 `view="entry_detail"` 读取具体 `entry_id`。
    - 只处理当前 crew 负责的条目和直接相关的新发现，不要越权写其他 crew。
    - {search_guidance}
    - 如果 `qa_feedback` 非空，优先处理其中属于搜索补证的缺口；被标成 `need_revision` 的条目要结合 `revision_detail` 定向返工。
    - 对 `content_type="single"` 的条目，优先使用 `update_entry` 补 `content/source/confidence`，必要时补 `unit/period`，确认后把 `status` 改成 `checked`。
    - 对 `content_type="table"` 的条目，按 `columns` 使用 `update_entry` 补齐 `content` 行数据，每一行都要覆盖所有列，再把 `status` 改成 `checked`。
    - 发现模板里没有的新事实、新数据或新 judgment 时，才使用 `add_entry`。
    - 每条新结论都要补 `add_evidence`，必要时调用 `status_update`。
    - 任务结束前必须调用 `registry_review` 留痕。
  expected_output: >
    面向 manager 的搜索补证完成报告：已更新的 entry_id 列表、未解决的缺口、主要证据来源摘要。
  agent: search_fact_agent

extract_file_facts:
  extract_guidance: "重点从 PDF 中提取管理层自认的可比对象、竞争对手、业务相似度线索和已有的 peer 对比数据。"
  description: >
    围绕 {company_name} 的 {pack_title} 执行 PDF 提取补证任务。

    输入：
    - PDF 文件路径：{pdf_file_path}
    - 页面索引文件路径：{page_index_file_path}
    - 当前 loop 原因：{loop_reason}
    - 当前专题焦点：{pack_focus}
    - 返工反馈：{qa_feedback}
    - 上游行业分析包：{industry_pack_text}
    - 上游业务分析包：{business_pack_text}

    执行要求：
    - 先读取页码索引，再有选择地读取相关页面，不要盲读全文。
    - {extract_guidance}
    - 先使用 `read_registry`，建议优先 `view="entry_list"`，并按 `owner_crew="{owner_crew}"`、`include_statuses=["unchecked","need_revision"]` 定位本轮要补的条目。
    - 只处理当前 crew 负责的条目和直接相关的新发现。
    - 如果 `qa_feedback` 非空，优先处理其中属于文件提取和原文核对的缺口；被标成 `need_revision` 的条目要结合 `revision_detail` 定向返工。
    - 对 `content_type="single"` 的条目，优先使用 `update_entry` 补 `content/source/confidence`，必要时补 `unit/period`，确认后把 `status` 改成 `checked`。
    - 对 `content_type="table"` 的条目，按 `columns` 使用 `update_entry` 补齐 `content` 行数据，每一行都要覆盖所有列，再把 `status` 改成 `checked`。
    - 发现模板里没有的新事实、新数据或新 judgment 时，才使用 `add_entry`。
    - 每条关键提取结果都要用 `add_evidence` 写明页码或原始来源。
    - 任务结束前必须调用 `registry_review` 留痕。
  expected_output: >
    面向 manager 的 PDF 提取完成报告：已更新的 entry_id 列表、未解决的缺口、关键原文引用来源（含页码）。
  agent: extract_file_fact_agent

check_registry:
  qa_guidance: "确认同行名单是否有明确的纳入/排除标准、关键 peer 指标是否口径一致、估值倍数是否已形成可复用底稿。"
  description: >
    检查 {company_name} 的 {pack_title} 当前 registry 是否已经达到可综合输出的最低要求。

    执行要求：
    - 先用 `read_registry` 按 `owner_crew="{owner_crew}"` 读取当前 crew 的条目。
    - {qa_guidance}
    - 找出仍是 `unchecked / need_revision` 的关键条目，尤其是 `high / medium` 优先级。
    - 如果发现遗漏，使用 `status_update` 补充更具体的 `revision_detail`，并在 `registry_review` 里写后续动作。
    - 你不负责新增正文内容；你只负责检查、标记和留痕。
    - 任务结束前必须调用 `registry_review` 留痕。
  expected_output: >
    面向 manager 的 QA 检查备忘录：整体就绪状态（ready/not ready）、未通过的 entry_id 及问题类型、修订建议、建议回退给 search 还是 extract。
  agent: qa_check_agent

synthesize_and_output:
  synthesize_guidance: "输出要明确纳入与排除逻辑、peer 核心财务与运营指标对比、估值倍数区间和可比性限制对估值结论的影响。"
  output_skeleton: |
    严格按下列格式形成一份结构化文本，严格使用下列标题作为标题，不得遗漏以下任何一个标题，不要增加任何标题和分节。必要时可以补充表格辅助阅读。
    每节要求写明：内容 / 来源 / 待确认事项。

    # {company_name} 同行信息分析
    ## 1. 可比公司筛选标准与样本清单
    - 1.1 筛选维度（主营构成、地域、规模、上市状态）
    - 1.2 纳入的可比公司清单及纳入理由
    - 1.3 排除的候选公司及排除理由
    ## 2. 经营与产品可比性
    - 2.1 各 peer 的主营业务构成与 {company_name} 的相似度
    - 2.2 产品/服务重叠度与差异点
    - 2.3 地域覆盖与客户群体对比
    ## 3. 财务与运营指标对比
    - 3.1 收入规模与增速对比（需明确口径和报告期）
    - 3.2 利润率对比（毛利率、净利率、EBITDA 利润率）
    - 3.3 关键运营指标对比（如适用）
    ## 4. 估值倍数对比
    - 4.1 P/E、P/S、EV/EBITDA 等估值倍数
    - 4.2 估值倍数的中位数与区间
    - 4.3 估值数据来源与时点
    ## 5. 可比性限制与使用边界
    - 5.1 样本局限性（数量、质量、口径差异）
    - 5.2 对估值结论的影响与使用建议
    - 5.3 仍待补充的 peer 信息
  description: >
    基于 registry 为 {company_name} 的 {pack_title} 生成最终 Markdown 分析包。

    输入：
    - 行业：{industry}
    - 输出路径：{pack_output_path}
    - 当前专题焦点：{pack_focus}
    - 上游行业分析包：{industry_pack_text}
    - 上游业务分析包：{business_pack_text}

    执行要求：
    - 先用 `read_registry` 按 `owner_crew="{owner_crew}"` 读取当前 crew 的全部条目；必要时继续用 `view="entry_detail"` 下钻关键 `entry_id`。
    - 只综合当前 crew 负责的事实、数据、judgment 和相关证据。
    - 如果 `high / medium` 条目仍是 `unchecked / need_revision`，必须先尝试补齐；确实无法补齐时，要在正文和 `registry_review` 里明确写出原因。
    - 对 `content_type="single"` 且正文为空或仍是“待补”的条目，优先使用 `update_entry` 补齐。
    - 对 `content_type="table"` 且内容为空表的条目，优先使用 `update_entry` 补齐行数据。
    - 新增 entry 时必须遵守统一 ID 规则：`F_`/`D_`/`J_` + pack 缩写 + 三位序号，例如 `F_HIS_001`、`D_FIN_001`、`J_BUS_001`；pack 缩写固定使用 HIS/IND/BUS/PEER/FIN/OPS/RISK。
    - 不得新建与已有 entry 内容重复的条目；如果只是补证据、补状态或补数值，应该更新已有 entry 或为已有 entry 追加 evidence。
    - 明确区分：已被证据支持、存在冲突、仍未解决。
    - 如果存在冲突，要写明冲突点和严重程度，不要静默忽略。
    - {synthesize_guidance}
    - 任务结束前必须调用 `registry_review` 留痕，说明本轮综合输出是否还有残余缺口。
  expected_output: >
    {output_skeleton}
  agent: synthesizing_agent
  output_file: "{pack_output_path}"
