    # ✨{company_name}——一句抓人的核心定位标题

    📌【概览】
    用 1 段高度浓缩文字说明公司是谁、核心看点是什么、当前投资关注点是什么。

    🌍【行业面】
    提炼行业空间、增速、结构性机会、赛道景气度，以及公司所处细分赛道的吸引力。

    🚀【基本面】
    提炼公司市场地位、产品或服务、核心竞争力、技术/渠道/客户/团队/壁垒等最重要信息。

    💰【财务面】
    提炼收入、利润、毛利率、净利率、研发投入、现金流、增长趋势等最关键财务指标。

    💎【估值面】
    提炼历史融资估值、当前估值区间、核心估值锚、与可比公司的相对优势或折价/溢价逻辑。

    🎯【筹码面】
    提炼发行规模、老股比例、基石/锚定情况、股权结构、筹码稀缺性、配售紧张度等信息。

    🌊【情绪面】
    提炼市场环境、板块风格、发行窗口、投资者情绪、风险偏好等外部交易背景。

    ⏳【时间表】
    提炼基石、聆讯、招股、上市或其他关键推进节点。若 context 缺乏信息，明确写“缺乏信息”。

    📈【最新业绩】
    仅当 context 中有明确的最新业绩更新、盈利预测更新或经营数据上修时输出该节；否则不要输出。

    补充约束：
    - 全文必须明显短于完整研究报告，目标是“高密度推介材料”而不是“详版报告”。
    - 每个模块最多 1-3 个自然段，优先保留数字和判断。
    - 可以使用“全球第三、中国第一”“利润率高”“筹码紧”等短句风格，但必须有 context 支撑。
    - 不要出现“根据上述分析”“如下所示”“本报告认为”这类研究报告口吻。
  agent: pitch_material_writer
  context:
    - investment_analysis_and_scoring
    - conduct_industry_research_analysis
    - conduct_financial_analysis
    - perform_comparable_valuation_analysis
    - assess_investment_risks
    - identify_management_communication_questions
  output_file: output/{company_name}_pitch_material.md

convert_research_report_md_to_pdf:
  description: >
    使用 markdown_to_pdf 工具将已生成的 Markdown 研究报告转换为 PDF。
    输入文件必须是 `.cache/{company_name}_research_report.md`，输出文件必须是 `output/{company_name}_research_report.pdf`，PDF 标题使用 `{company_name} Buy-Side Research Report`。
    不要改写报告内容，只执行转换。
  expected_output: >
    一条成功消息，明确说明 PDF 已创建于 `output/{company_name}_research_report.pdf`。
  agent: research_report_writer
  context:
    - compile_research_report

create_investment_snapshot_ppt:
  description: >
    作为 {company_name} 的投委会单页 PPT 制作人，你的唯一任务是基于 context 中传入的既有分析结果，压缩并生成一份独立的单页投资快照 PPT。

    该任务只能使用以下 context：
    - analyze_business_model
    - conduct_financial_analysis
    - investment_analysis_and_scoring
    - assess_investment_risks

    绝对约束：
    1. 不得重新读取 PDF，不得调用搜索工具，不得补充任何 context 外的新事实或新数字。
    2. 必须调用 `investment_snapshot_ppt_tool` 一次且仅一次，生成最终 PPTX 文件。
    3. 页面主标题固定为 `机会速览：` {company_name}。
    4. 红色 banner 文案必须使用定位短句形式撰写；定位短句由你从 context 中提炼，以突出公司核心竞争力、强调投资吸引力为原则，必须简洁有力，朗朗上口，字数10-15 字。
    5. `overview_summary` 必须是一段约 90 字的摘要，先简单说明公司做什么、为何具备吸引力。
    6. `overview_product_items` 固定 3 条，每条都必须使用 `name` 和 `description` 两个字段；`name` 是产品名称，`description` 是约 30 字的产品定义或用途简介+此类产品的技术或财务亮点。
    7. 财务数据不得由你手工映射为 `financial_rows`；你必须把 `conduct_financial_analysis` 的完整原文原样放入 `financial_source_markdown`，由工具确定性解析。
    8. 快照页财务区将固定展示以下 8 个指标：`营业收入`、`营业收入增长率`、`毛利率`、`净利率`、`净利润增长率`、`总资产`、`资产负债率`、`ROE`；若上游缺失，工具会按规则补“缺乏信息”或做有限推导。
    9. `highlight_items` 必须使用 `title` 和 `detail` 两个字段，条数为 3-5 条；每条只表达一个亮点，不得把两个亮点合并到一条里。
    10. `risk_items` 必须使用 `title` 和 `detail` 两个字段，条数为 1-2 条；只要 context 中存在 2 个可独立命名的风险主题，就必须拆成 2 条。
    11. 每条 `risk_items.title` 只能命名一个风险主题，禁止在标题中使用“与、及、和、并且、叠加、/”等连接两个独立风险；每条 `risk_items.detail` 也只能围绕该单一风险展开。
    12. 若某财务指标、亮点或风险在 context 中缺乏明确信息，必须明确填写“缺乏信息”，不得猜测。
    13. 最终输出文件必须是 `output/{company_name}_investment_snapshot.pptx`。

    工具调用参数要求：
    - `pptx_path`: `output/{company_name}_investment_snapshot.pptx`
    - `slide_title`: 固定写 `投资要点速览`
    - `positioning_line`: 你提炼的一句核心定位
    - `overview_summary`: 约 90 字的公司摘要
    - `overview_product_items`: 使用 `name` 和 `description` 两个字段传入 3 条产品项
    - `financial_source_markdown`: 直接传入 conduct_financial_analysis 的完整输出原文，不得改写、不摘录
    - `highlight_items`: 使用 `title` 和 `detail` 两个字段传入 3-5 条投资亮点。
    - `risk_items`: 使用 `title` 和 `detail` 两个字段传入 1-2 条投资风险，且每条只能对应一个独立风险主题。
  expected_output: >
    一条成功消息，明确说明 PPT 已创建于 `output/{company_name}_investment_snapshot.pptx`。
  agent: investment_snapshot_slide_writer
  context:
    - analyze_business_model
    - conduct_financial_analysis
    - investment_analysis_and_scoring
    - assess_investment_risks
