    完整插入 conduct_industry_research_analysis 的全部输出内容，仅允许做标题层级降级与基础排版整理，不得改写任何正文内容。
    ## 4. 公司商业模式分析
    完整插入 analyze_business_model 的全部输出内容，仅允许做标题层级降级与基础排版整理，不得改写任何正文内容。
    ## 4. 公司战略方向分析
    完整插入 analyze_strategic_capital_plans 的全部输出内容，仅允许做标题层级降级与基础排版整理，不得改写任何正文内容。
    ## 4. 公司管理层分析
    完整插入 analyze_management 的全部输出内容，仅允许做标题层级降级与基础排版整理，不得改写任何正文内容。
    ## 4. 财务深度分析
