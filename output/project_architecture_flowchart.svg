<svg width="1660" height="1120" viewBox="0 0 1660 1120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1660" y2="1120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F2E8"/>
      <stop offset="1" stop-color="#E9E3D7"/>
    </linearGradient>
    <linearGradient id="panelA" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFF8E8"/>
      <stop offset="1" stop-color="#F2E2B8"/>
    </linearGradient>
    <linearGradient id="panelB" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#EFF7FF"/>
      <stop offset="1" stop-color="#CFE4F7"/>
    </linearGradient>
    <linearGradient id="panelC" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F5FAF0"/>
      <stop offset="1" stop-color="#D8E9CC"/>
    </linearGradient>
    <linearGradient id="panelD" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFF2F2"/>
      <stop offset="1" stop-color="#F4D6D6"/>
    </linearGradient>
    <linearGradient id="foundation" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#D8E7F7"/>
      <stop offset="1" stop-color="#AFC8E6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#6E6556" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowDark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5C6370"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#98A0AA"/>
    </marker>
    <style>
      .title { font: 700 34px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #2B2924; }
      .subtitle { font: 400 18px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #625C53; }
      .panelTitle { font: 700 25px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #2B2924; }
      .cardTitle { font: 700 19px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #2B2924; }
      .body { font: 400 16px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #46423C; }
      .small { font: 400 14px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #5C574F; }
      .pill { font: 700 15px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #2B2924; }
      .solidLine { stroke: #5C6370; stroke-width: 4; marker-end: url(#arrowDark); }
      .softLine { stroke: #8C95A3; stroke-width: 3; stroke-dasharray: 8 10; marker-end: url(#arrowGray); }
      .futureBorder { stroke: #9AA2AC; stroke-width: 3; stroke-dasharray: 10 10; }
    </style>
  </defs>

  <rect width="1660" height="1120" rx="30" fill="url(#bg)"/>

  <text x="70" y="70" class="title">自动化买方研究报告生成器 v0.1</text>
  <text x="70" y="104" class="subtitle">只用自然语言描述项目的目的和动作。实线表示当前已实现，灰色虚线表示下一阶段重点补强。</text>

  <rect x="1290" y="38" width="300" height="78" rx="18" fill="#F8F5EF" stroke="#D3C8B7" stroke-width="2"/>
  <line x1="1320" y1="68" x2="1380" y2="68" class="solidLine"/>
  <text x="1402" y="74" class="small">当前已实现</text>
  <line x1="1320" y1="94" x2="1380" y2="94" class="softLine"/>
  <text x="1402" y="100" class="small">下一阶段重点</text>

  <rect x="40" y="150" width="340" height="790" rx="28" fill="url(#panelA)" stroke="#D2B15F" stroke-width="2" filter="url(#shadow)"/>
  <rect x="410" y="150" width="290" height="790" rx="28" fill="url(#panelB)" stroke="#86B4DA" stroke-width="2" filter="url(#shadow)"/>
  <rect x="730" y="150" width="610" height="790" rx="28" fill="url(#panelC)" stroke="#99BE84" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1370" y="150" width="250" height="790" rx="28" fill="url(#panelD)" stroke="#D59C9C" stroke-width="2" filter="url(#shadow)"/>

  <text x="210" y="196" text-anchor="middle" class="panelTitle">资料进入系统</text>
  <text x="555" y="196" text-anchor="middle" class="panelTitle">数据与工具层</text>
  <text x="1035" y="196" text-anchor="middle" class="panelTitle">分析与写作流程</text>
  <text x="1495" y="196" text-anchor="middle" class="panelTitle">最终产出</text>

  <rect x="68" y="240" width="284" height="120" rx="22" fill="#FFFDF8" stroke="#D2B15F" stroke-width="2.5"/>
  <text x="210" y="280" text-anchor="middle" class="cardTitle">1. 读入原始资料</text>
  <text x="210" y="312" text-anchor="middle" class="body">把招股书、年报等 PDF 放进系统</text>
  <text x="210" y="338" text-anchor="middle" class="small">这是整个分析的起点</text>

  <rect x="68" y="390" width="284" height="130" rx="22" fill="#FFFDF8" stroke="#D2B15F" stroke-width="2.5"/>
  <text x="210" y="430" text-anchor="middle" class="cardTitle">2. 先做基础识别</text>
  <text x="210" y="462" text-anchor="middle" class="body">识别公司名称、所属行业</text>
  <text x="210" y="488" text-anchor="middle" class="small">先把研究对象是谁确定下来</text>

  <rect x="68" y="550" width="284" height="150" rx="22" fill="#FFFDF8" stroke="#D2B15F" stroke-width="2.5"/>
  <text x="210" y="590" text-anchor="middle" class="cardTitle">3. 再做页级整理</text>
  <text x="210" y="622" text-anchor="middle" class="body">给每一页打上简短主题标签</text>
  <text x="210" y="648" text-anchor="middle" class="small">方便后面的分析员快速定位</text>
  <text x="210" y="670" text-anchor="middle" class="small">只读取真正相关的页面</text>

  <rect x="68" y="730" width="284" height="110" rx="22" fill="#F5E7BA" stroke="#D2B15F" stroke-width="2.5"/>
  <text x="210" y="770" text-anchor="middle" class="cardTitle">4. 形成共享材料层</text>
  <text x="210" y="802" text-anchor="middle" class="small">把中间结果存下来，供所有后续分析复用</text>

  <path d="M210 360V390" class="solidLine"/>
  <path d="M210 520V550" class="solidLine"/>
  <path d="M210 700V730" class="solidLine"/>

  <rect x="440" y="240" width="230" height="150" rx="22" fill="#FFFFFF" stroke="#86B4DA" stroke-width="2.5"/>
  <text x="555" y="280" text-anchor="middle" class="cardTitle">当前数据来源</text>
  <text x="555" y="314" text-anchor="middle" class="body">公司 PDF + 公开网页信息</text>
  <text x="555" y="340" text-anchor="middle" class="small">用于行业核对、管理层补充、风险补充</text>
  <text x="555" y="362" text-anchor="middle" class="small">以及可比公司估值数据抓取</text>

  <rect x="440" y="430" width="230" height="150" rx="22" fill="#FFFFFF" stroke="#86B4DA" stroke-width="2.5"/>
  <text x="555" y="470" text-anchor="middle" class="cardTitle">当前工具动作</text>
  <text x="555" y="504" text-anchor="middle" class="body">先看页索引，再读相关页面</text>
  <text x="555" y="530" text-anchor="middle" class="body">需要时补充外部搜索</text>
  <text x="555" y="556" text-anchor="middle" class="small">尽量减少无关信息进入上下文</text>

  <rect x="430" y="620" width="250" height="220" rx="24" fill="#F1F3F5" class="futureBorder"/>
  <text x="555" y="662" text-anchor="middle" class="cardTitle" fill="#49515A">下次最重要更新</text>
  <text x="555" y="696" text-anchor="middle" class="cardTitle" fill="#49515A">数据层 API</text>
  <text x="555" y="732" text-anchor="middle" class="body" fill="#5F6670">把行情、财务、估值、一致预期</text>
  <text x="555" y="758" text-anchor="middle" class="body" fill="#5F6670">这些关键数据统一接进来</text>
  <text x="555" y="788" text-anchor="middle" class="small" fill="#6E7580">目标是让估值输入更稳定、</text>
  <text x="555" y="810" text-anchor="middle" class="small" fill="#6E7580">更准确，也更容易重复执行</text>

  <path d="M352 785H410" class="solidLine"/>
  <path d="M555 580V620" class="softLine"/>
  <path d="M670 315H730" class="solidLine"/>
  <path d="M670 505H760" class="solidLine"/>

  <rect x="760" y="232" width="550" height="70" rx="18" fill="#E4F0D9"/>
  <text x="1035" y="260" text-anchor="middle" class="pill">整体上是顺序执行：先拆解资料，再分工分析，最后汇总成研究报告</text>
  <text x="1035" y="286" text-anchor="middle" class="small">每一组分析都是为最终报告服务</text>

  <rect x="760" y="330" width="550" height="220" rx="24" fill="#FBFEF8" stroke="#99BE84" stroke-width="2.5"/>
  <text x="1035" y="370" text-anchor="middle" class="cardTitle">A. 基础分析</text>
  <text x="1035" y="404" text-anchor="middle" class="body">看行业、商业模式、财务、运营、管理层、风险、战略资本</text>
  <text x="1035" y="434" text-anchor="middle" class="small">目的：先把公司是什么、生意怎么转、风险在哪、钱赚得怎么样看明白</text>
  <text x="1035" y="464" text-anchor="middle" class="small">这些内容会变成后面估值、打分和写报告的基础材料</text>

  <rect x="760" y="580" width="550" height="230" rx="24" fill="#FBFEF8" stroke="#99BE84" stroke-width="2.5"/>
  <text x="1035" y="620" text-anchor="middle" class="cardTitle">B. 估值分析</text>
  <text x="1035" y="654" text-anchor="middle" class="body">先找同行，再补同行数据，再做可比估值</text>
  <rect x="880" y="678" width="310" height="36" rx="18" fill="#F7E5B7"/>
  <text x="1035" y="701" text-anchor="middle" class="pill">当前只有 comps 能力</text>
  <text x="1035" y="734" text-anchor="middle" class="small">但 comps 的估值数据目前还不够准确，结果只能先作参考</text>
  <text x="1035" y="760" text-anchor="middle" class="small">DCF 还没有接进去，后面要结合数据层 API 再研究怎么加</text>

  <rect x="760" y="840" width="550" height="90" rx="18" fill="#DDECCD"/>
  <text x="1035" y="876" text-anchor="middle" class="cardTitle">C. 报告整理与质检</text>
  <text x="1035" y="904" text-anchor="middle" class="small">把各模块结果汇总、检查一致性、生成完整研究报告</text>

  <path d="M1035 550V580" class="solidLine"/>
  <path d="M1035 810V840" class="solidLine"/>
  <path d="M680 730C750 730 790 730 860 730" class="softLine"/>

  <rect x="1400" y="250" width="190" height="120" rx="22" fill="#FFFFFF" stroke="#D59C9C" stroke-width="2.5"/>
  <text x="1495" y="292" text-anchor="middle" class="cardTitle">模块分析结果</text>
  <text x="1495" y="326" text-anchor="middle" class="small">每个分析模块先产出自己的中间稿</text>

  <rect x="1400" y="420" width="190" height="130" rx="22" fill="#FFFFFF" stroke="#D59C9C" stroke-width="2.5"/>
  <text x="1495" y="462" text-anchor="middle" class="cardTitle">完整研究报告</text>
  <text x="1495" y="496" text-anchor="middle" class="small">把各部分内容按固定顺序拼成完整报告</text>

  <rect x="1400" y="600" width="190" height="160" rx="22" fill="#FFFFFF" stroke="#D59C9C" stroke-width="2.5"/>
  <text x="1495" y="642" text-anchor="middle" class="cardTitle">最终交付物</text>
  <text x="1495" y="676" text-anchor="middle" class="body">Markdown 报告</text>
  <text x="1495" y="702" text-anchor="middle" class="body">+ PDF 报告</text>
  <text x="1495" y="730" text-anchor="middle" class="small">可以直接给投研团队阅读</text>

  <rect x="1400" y="810" width="190" height="120" rx="22" fill="#F7E8E8"/>
  <text x="1495" y="850" text-anchor="middle" class="cardTitle">当前最重要提醒</text>
  <text x="1495" y="882" text-anchor="middle" class="small">1. 数据层 API 还没接进来</text>
  <text x="1495" y="906" text-anchor="middle" class="small">2. comps 数据还不准确</text>

  <path d="M1310 440H1400" class="solidLine"/>
  <path d="M1495 370V420" class="solidLine"/>
  <path d="M1495 550V600" class="solidLine"/>

  <rect x="60" y="980" width="1540" height="100" rx="26" fill="url(#foundation)" stroke="#7398BF" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="830" y="1020" text-anchor="middle" class="panelTitle">LLM 底座</text>
  <text x="830" y="1054" text-anchor="middle" class="body">整套流程底下都是同一个大模型能力在支撑：理解材料、分配注意力、执行分析、整理文字输出</text>
</svg>
